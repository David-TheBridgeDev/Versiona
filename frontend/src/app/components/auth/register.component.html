<div class="auth-container">
  <div class="auth-card">
    <h2>Register</h2>
    <p>Enter your email to start registration. We will send you a verification code.</p>
    
    <form (submit)="onSubmit(); $event.preventDefault()">
      <div class="form-group">
        <label for="email">Email</label>
        <input id="email" type="email" autocomplete="username" [formField]="registerForm.email" placeholder="you@email.com" />
        @if (registerForm.email().touched() && registerForm.email().errors().length) {
          <span class="error-text">{{ registerForm.email().errors()[0].message }}</span>
        }
      </div>

      @if (error()) {
        <div class="alert alert-danger">{{ error() }}</div>
      }

      <button type="submit" [disabled]="registerForm().invalid() || loading()">
        @if (loading()) {
          Sending...
        } @else {
          Verify email
        }
      </button>

      <div class="auth-footer">
        Already have an account? <a routerLink="/auth/login">Login</a>
      </div>
    </form>
  </div>
</div>
