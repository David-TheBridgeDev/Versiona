services:
  db:
    image: postgres:15-alpine
    container_name: versiona_db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password_change_me}
      POSTGRES_DB: ${POSTGRES_DB:-versiona_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: versiona_redis
    restart: always
    ports:
      - "6379:6379"

  api:
    build: ./backend
    container_name: versiona_api
    restart: always
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://postgres:password@db:5432/versiona_db
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - db
      - redis
    volumes:
      - ./backend:/app
      - ./uploads:/app/uploads
    deploy:
      resources:
        limits:
          memory: 2GB
        reservations:
          memory: 512MB

  worker:
    build: ./backend
    container_name: versiona_worker
    restart: always
    command: celery -A tasks worker --loglevel=info --concurrency=1
    environment:
      - DATABASE_URL=postgresql://postgres:password@db:5432/versiona_db
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - db
      - redis
    volumes:
      - ./backend:/app
      - ./uploads:/app/uploads
    deploy:
      resources:
        limits:
          memory: 8GB
        reservations:
          memory: 2GB

  frontend:
    build: ./frontend
    container_name: versiona_frontend
    restart: always
    ports:
      - "4200:4200"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - api

volumes:
  postgres_data:
